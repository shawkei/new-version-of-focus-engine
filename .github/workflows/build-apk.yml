name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # تأكد من استخدام v4 هنا أيضاً
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4  # تم التغيير إلى v4
      with:
        name: focus-engine-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error  # خاصية جديدة ومفيدة في v4
        compression-level: 0       # لتحسين سرعة الرفع
