name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create fresh Flutter project
      run: |
        cd /home/runner/work
        flutter create --org com.shawkei --project-name focus_engine_build focus_engine_new
        cd focus_engine_new
        rm -rf lib
        
    - name: Copy source code
      run: |
        cp -r ${{ github.workspace }}/lib /home/runner/work/focus_engine_new/
        cp ${{ github.workspace }}/pubspec.yaml /home/runner/work/focus_engine_new/
        
    - name: Fix pubspec if needed
      run: |
        cd /home/runner/work/focus_engine_new
        flutter pub get
        
    - name: Build APK
      run: |
        cd /home/runner/work/focus_engine_new
        flutter build apk --release
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: focus-engine-apk
        path: /home/runner/work/focus_engine_new/build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error
